<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        min-height: 100vh; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
    }
    form {
        background: white; 
        padding: 40px; 
        border-radius: 10px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        width: 100%; 
        max-width: 400px;
    }
    h1 { 
        text-align: center; 
        color: #333; 
        margin-bottom: 5px;
        font-size: 28px; 
    }
    input { 
        width: 100%; 
        padding: 12px; 
        margin: 10px 0 20px 0; 
        border: 1px solid #ddd; 
        border-radius: 5px; 
        font-size: 14px; 
    }
    input[type="submit"] { 
        background: #667eea; 
        color: white; 
        border: none; 
        cursor: pointer; 
        font-weight: bold; 
        transition: 0.3s; 
    }
    input[type="submit"]:hover { background: #764ba2; }
    label { color: #666; font-weight: 600; display: block; margin-bottom: 5px; }
    p { text-align: center; color: white; margin-top: 20px; }
    a { color: #667eea; text-decoration: none; }

    .error { color: red; margin-bottom: 16px; text-align: center; }

</style>
</head>
<body>
    
    <form method = "post" id = "LoginForm">
        <h1>Login</h1>
        {% csrf_token %}
        username:<input type = "text" placeholder="enter username" name = "username" id="username"/>
        <br>
        password:<input type = "password" placeholder = "enter password" name="password" id = "password"/>
        <br>

        <input type = "submit" value = "Login"/>

        <label> Don't have an account?</label><a href = "{%url 'home'%}"> Signup</a>

        {% if error %}
            <p class = "error" id = "errormessage">{{error}}</p>
        {% endif %}  

    </form>
    <script>
        const errorElement = document.getElementById('errormessage');
        const Form = document.getElementById('LoginForm');

        if (errorElement) {

            Form.reset();

            setTimeout(()=>{
                errorElement.style.display = 'none';
                
            }, 10000);
        }

    </script>
</body>
</html>
